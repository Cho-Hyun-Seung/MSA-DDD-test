server {
    listen 80;

    location /api/product/ {
        proxy_pass http://product-service:8080/api/product/;
    }

    location /api/orders/ {
        proxy_pass http://order-service:8081/api/orders/;
    }

    # Swagger UI는 product-service가 제공
    location /swagger-ui/ {
        proxy_pass http://product-service:8080/swagger-ui/;
    }

    # (선택) 기본 api-docs도 열어둠
    location /v3/api-docs/ {
        proxy_pass http://product-service:8080/v3/api-docs/;
    }
    location /v3/api-docs {
        proxy_pass http://product-service:8080/v3/api-docs;
    }

    # ✅ product alias
    location = /product-api-docs {
        proxy_pass http://product-service:8080/v3/api-docs;
    }
    location = /product-api-docs/swagger-config {
        proxy_pass http://product-service:8080/v3/api-docs/swagger-config;
    }
    location /product-api-docs/ {
        proxy_pass http://product-service:8080/v3/api-docs/;
    }

    # ✅ order alias
    location = /order-api-docs {
        proxy_pass http://order-service:8081/v3/api-docs;
    }
    location = /order-api-docs/swagger-config {
        proxy_pass http://order-service:8081/v3/api-docs/swagger-config;
    }
    location /order-api-docs/ {
        proxy_pass http://order-service:8081/v3/api-docs/;
    }
}