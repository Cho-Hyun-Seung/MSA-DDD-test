spring:
  application:
    name: product-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: never

springdoc:
  swagger-ui:
    path: /swagger-ui
    urls:
      - name: product-service
        url: /product-api-docs
      - name: order-service
        url: /order-api-docs
    operations-sorter: method
    tags-sorter: alpha